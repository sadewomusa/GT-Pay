<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>GTPay — Customer Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;width:100%;overflow:hidden}
  body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:#06090F;color:#E6EBF5;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#253044;border-radius:3px}
  input:focus{border-color:#0EA5E9!important;outline:none}
  button{font-family:inherit;-webkit-tap-highlight-color:transparent}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fu{animation:fadeUp 0.35s ease forwards}
  .fu1{animation-delay:.05s;opacity:0}.fu2{animation-delay:.1s;opacity:0}.fu3{animation-delay:.15s;opacity:0}.fu4{animation-delay:.2s;opacity:0}
  .rh:hover{background:#182030!important}
  @media(hover:none){.rh:active{background:#182030!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

/* ═══ ICONS ═══ */
const I=({children,size=20})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{children}</svg>;
const IcDash=p=><I {...p}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></I>;
const IcInv=p=><I {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></I>;
const IcWallet=p=><I {...p}><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M16 12h.01"/><path d="M22 10H18a2 2 0 1 0 0 4h4"/></I>;
const IcHist=p=><I {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></I>;
const IcFile=p=><I {...p}><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></I>;
const IcHelp=p=><I {...p}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></I>;
const IcShip=p=><I {...p}><path d="M2 20l.8-2.4A2 2 0 0 1 4.7 16h14.6a2 2 0 0 1 1.9 1.6L22 20"/><path d="M12 4v12"/><path d="M5 12h14l-2-8H7z"/></I>;
const IcSearch=p=><I {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></I>;
const IcBell=p=><I {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></I>;
const IcCheck=p=><I {...p}><polyline points="20 6 9 17 4 12"/></I>;
const IcAlert=p=><I {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></I>;
const IcDown=p=><I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></I>;
const IcChev=p=><I {...p}><polyline points="9 18 15 12 9 6"/></I>;
const IcAnchor=p=><I {...p}><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></I>;
const IcX=p=><I {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></I>;
const IcUser=p=><I {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></I>;
const IcBox=p=><I {...p}><rect x="2" y="7" width="20" height="13" rx="1"/><path d="M9 7V4h6v3"/><line x1="8" y1="11" x2="8" y2="16"/><line x1="12" y1="11" x2="12" y2="16"/><line x1="16" y1="11" x2="16" y2="16"/></I>;
const IcMenu=p=><I {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></I>;
const IcBack=p=><I {...p}><polyline points="15 18 9 12 15 6"/></I>;

/* ═══ THEME ═══ */
const C={bg:"#06090F",sf:"#0D1117",card:"#131A25",cardH:"#182030",brd:"#1C2536",brdL:"#253044",txt:"#E6EBF5",ts:"#8B9BB5",td:"#4C5C78",ac:"#0284C7",ab:"#38BDF8",as:"#0284C715",gn:"#10B981",gs:"#10B98115",yl:"#EAB308",ys:"#EAB30815",rd:"#EF4444",rs:"#EF444415",tl:"#14B8A6"};
const CUR="AED";
const fm=n=>new Intl.NumberFormat("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const aed=n=>CUR+" "+fm(n);
const sc=s=>({paid:C.gn,completed:C.gn,pending:C.yl,overdue:C.rd,processing:C.ac}[s]||C.td);
const sb=s=>({paid:C.gs,completed:C.gs,pending:C.ys,overdue:C.rs,processing:C.as}[s]||C.td+"18");

/* ═══ RESPONSIVE HOOK ═══ */
const useIsMobile=()=>{
  const [m,setM]=useState(window.innerWidth<768);
  useEffect(()=>{const h=()=>setM(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h)},[]);
  return m;
};

/* ═══ DATA ═══ */
const cust={name:"Mediterranean Shipping Company",short:"MSC",id:"CUST-MSC-00147",contact:"Ahmad Al-Rashid",email:"port.finance@msc.com",creditLimit:500000,creditUsed:214666};

const invs=[
  {id:"INV-2026-0847",vessel:"MSC AURORA",voyage:"VA-2843E",type:"Vessel Call",services:[{name:"Pilotage (In & Out)",amt:8400},{name:"Towage (2 Tugs × 3hrs)",amt:14400},{name:"Berth Hire (T2-B4, 2 days)",amt:11100},{name:"Mooring / Unmooring",amt:3400},{name:"Fresh Water Supply (180t)",amt:5400},{name:"Waste Disposal",amt:5150}],amount:47850,due:"2026-03-15",issued:"2026-03-02",status:"pending",containers:342,berth:"T2-B4"},
  {id:"INV-2026-0838",vessel:"MSC DIANA",voyage:"VD-1190S",type:"Container Handling",services:[{name:"THC — 320 × 20ft (TEU)",amt:59200},{name:"THC — 180 × 40ft (FEU)",amt:51300},{name:"Reefer Plug-in (42 units × 3 days)",amt:8190},{name:"Lift On/Off (500 moves)",amt:15000},{name:"VGM Weighing (500 units)",amt:3250}],amount:136940,due:"2026-03-10",issued:"2026-02-25",status:"overdue",containers:500,berth:"T1-B3"},
  {id:"INV-2026-0832",vessel:"MSC AURORA",voyage:"VA-2841E",type:"Storage & Demurrage",services:[{name:"Container Storage (78 TEU × 8 days)",amt:14976},{name:"Demurrage Charges",amt:9800},{name:"Reefer Storage (12 units × 5 days)",amt:5100}],amount:29876,due:"2026-03-20",issued:"2026-03-05",status:"pending",containers:78,berth:"Yard A"},
  {id:"INV-2026-0819",vessel:"MSC FANTASIA",voyage:"VF-0887W",type:"Vessel Call",services:[{name:"Pilotage (In & Out)",amt:9200},{name:"Towage (3 Tugs × 4hrs)",amt:28800},{name:"Berth Hire (T1-B1, 3 days)",amt:16650},{name:"Mooring / Unmooring",amt:3400},{name:"Bunkering Support",amt:4250}],amount:62300,due:"2026-02-28",issued:"2026-02-15",status:"paid",containers:610,berth:"T1-B1"},
  {id:"INV-2026-0802",vessel:"MSC DIANA",voyage:"VD-1187S",type:"Container Handling",services:[{name:"THC — 240 × 20ft (TEU)",amt:44400},{name:"THC — 120 × 40ft (FEU)",amt:34200},{name:"Reefer Monitoring (28 units)",amt:5460},{name:"Customs Inspection Support",amt:4800}],amount:88860,due:"2026-02-20",issued:"2026-02-08",status:"paid",containers:360,berth:"T1-B3"},
  {id:"INV-2026-0791",vessel:"MSC AURORA",voyage:"VA-2839E",type:"Vessel Call",services:[{name:"Pilotage (In & Out)",amt:8400},{name:"Towage (2 Tugs × 2hrs)",amt:9600},{name:"Berth Hire (T2-B4, 1.5 days)",amt:8325},{name:"Mooring / Unmooring",amt:3400}],amount:29725,due:"2026-02-12",issued:"2026-02-01",status:"paid",containers:280,berth:"T2-B4"},
];

const txns=[
  {id:"TXN-90281",invoice:"INV-2026-0819",vessel:"MSC FANTASIA",amount:62300,method:"Wire Transfer",ref:"SWIFT: MSCLGB2L...8847",date:"2026-02-28",status:"completed"},
  {id:"TXN-90267",invoice:"INV-2026-0802",vessel:"MSC DIANA",amount:88860,method:"Wire Transfer",ref:"SWIFT: MSCLGB2L...6614",date:"2026-02-20",status:"completed"},
  {id:"TXN-90254",invoice:"INV-2026-0791",vessel:"MSC AURORA",amount:29725,method:"Letter of Credit",ref:"LC/2026/MSC/0178",date:"2026-02-12",status:"completed"},
  {id:"TXN-90231",invoice:"INV-2026-0776",vessel:"MSC AURORA",amount:41200,method:"Wire Transfer",ref:"SWIFT: MSCLGB2L...2290",date:"2026-01-30",status:"completed"},
  {id:"TXN-90218",invoice:"INV-2026-0761",vessel:"MSC FANTASIA",amount:55100,method:"Wire Transfer",ref:"SWIFT: MSCLGB2L...1158",date:"2026-01-22",status:"completed"},
];

/* ═══ NOTIFICATIONS — each has an action (tab to go to, optional invoice to open) ═══ */
const notifs=[
  {id:1,text:"INV-2026-0838 for MSC DIANA is overdue. Please arrange payment.",color:C.rd,time:"2h ago",action:{tab:"invoices",invoiceId:"INV-2026-0838"},read:false},
  {id:2,text:"New invoice INV-2026-0847 issued for MSC AURORA.",color:C.ab,time:"1d ago",action:{tab:"invoices",invoiceId:"INV-2026-0847"},read:false},
  {id:3,text:"Payment TXN-90281 confirmed — INV-2026-0819 settled.",color:C.gn,time:"3d ago",action:{tab:"history"},read:false},
  {id:4,text:"Credit utilization at 43%. AED 285,334 available.",color:C.yl,time:"5d ago",action:{tab:"statements"},read:true},
];

/* ═══ SMALL COMPONENTS ═══ */
const Badge=({status,style:sx})=><span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:16,fontSize:11,fontWeight:600,color:sc(status),background:sb(status),textTransform:"capitalize",whiteSpace:"nowrap",...sx}}><span style={{width:5,height:5,borderRadius:"50%",background:sc(status)}}/>{status}</span>;

const Btn=({variant="primary",children,style:sx,...p})=>{
  const b={display:"inline-flex",alignItems:"center",gap:8,padding:"10px 20px",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",border:"none",transition:"all 0.15s",fontFamily:"inherit"};
  const v={primary:{background:C.ac,color:"#fff"},outline:{background:"transparent",color:C.txt,border:`1px solid ${C.brdL}`},ghost:{background:"transparent",color:C.ts}};
  return <button style={{...b,...(v[variant]||v.primary),...sx}} {...p}>{children}</button>;
};

const Spark=({data,color,w=110,h=32})=>{
  const mx=Math.max(...data),mn=Math.min(...data),r=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/r)*(h-4)-2}`).join(" ");
  const gid="g"+color.replace(/[^a-z0-9]/gi,"").slice(0,8);
  return <svg width={w} height={h} style={{display:"block"}}><defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs><polygon points={`0,${h} ${pts} ${w},${h}`} fill={`url(#${gid})`}/><polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/></svg>;
};

const Card=({children,style:sx,...p})=><div style={{background:C.card,borderRadius:14,border:`1px solid ${C.brd}`,padding:"18px 20px",...sx}} {...p}>{children}</div>;

/* ═══════════ MAIN APP ═══════════ */
function App(){
  const mob=useIsMobile();
  const [tab,setTab]=useState("home");
  const [selInv,setSelInv]=useState(null);
  const [payModal,setPayModal]=useState(false);
  const [payStep,setPayStep]=useState(0);
  const [payInv,setPayInv]=useState(null);
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [notifOpen,setNotifOpen]=useState(false);
  const [selPay,setSelPay]=useState([]);
  const [payMethod,setPayMethod]=useState("wire");
  const [moreOpen,setMoreOpen]=useState(false);
  const [notifsState,setNotifsState]=useState(notifs);

  /* ── NAVIGATION HISTORY (back button support) ── */
  const [navHistory,setNavHistory]=useState([]);
  const canGoBack=navHistory.length>0||selInv!==null;

  const navigate=(newTab,invoice=null)=>{
    // Push current state to history
    setNavHistory(prev=>[...prev,{tab,selInv,moreOpen}]);
    setTab(newTab);
    setSelInv(invoice);
    setMoreOpen(false);
    setNotifOpen(false);
  };

  const goBack=()=>{
    if(selInv){
      // If viewing invoice detail, go back to invoice list
      setSelInv(null);
      return;
    }
    if(navHistory.length>0){
      const prev=navHistory[navHistory.length-1];
      setNavHistory(h=>h.slice(0,-1));
      setTab(prev.tab);
      setSelInv(prev.selInv);
      setMoreOpen(prev.moreOpen||false);
    }
  };

  const goHome=()=>{
    setNavHistory([]);
    setTab("home");
    setSelInv(null);
    setMoreOpen(false);
    setNotifOpen(false);
  };

  // Tab navigation from bottom bar / sidebar (resets history)
  const goTab=t=>{
    if(t===tab&&!selInv){return}
    setNavHistory([]);
    setTab(t);
    setSelInv(null);
    setMoreOpen(false);
  };

  // Handle notification click
  const handleNotifClick=(notif)=>{
    // Mark as read
    setNotifsState(prev=>prev.map(n=>n.id===notif.id?{...n,read:true}:n));
    setNotifOpen(false);
    if(notif.action){
      const inv=notif.action.invoiceId?invs.find(i=>i.id===notif.action.invoiceId):null;
      navigate(notif.action.tab,inv);
    }
  };

  const unreadCount=notifsState.filter(n=>!n.read).length;

  const unpaid=invs.filter(i=>i.status!=="paid");
  const totalOut=unpaid.reduce((s,i)=>s+i.amount,0);
  const totalOver=invs.filter(i=>i.status==="overdue").reduce((s,i)=>s+i.amount,0);
  const totalPaid=invs.filter(i=>i.status==="paid").reduce((s,i)=>s+i.amount,0);
  const batchTot=selPay.reduce((s,id)=>s+(invs.find(i=>i.id===id)?.amount||0),0);
  const filtered=invs.filter(inv=>{const q=search.toLowerCase();return(!q||inv.id.toLowerCase().includes(q)||inv.vessel.toLowerCase().includes(q))&&(filter==="all"||inv.status===filter)});

  const openPay=inv=>{setPayInv(inv);setPayStep(0);setPayModal(true)};
  const gap=mob?14:20;

  /* ── NOTIFICATION PANEL (shared between mobile/desktop) ── */
  const NotifPanel=({style:sx})=><div style={{background:C.sf,border:`1px solid ${C.brd}`,borderRadius:14,boxShadow:"0 20px 60px rgba(0,0,0,0.6)",overflow:"hidden",...sx}}>
    <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.brd}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontWeight:700,fontSize:14}}>Notifications</span>
      {unreadCount>0&&<span style={{fontSize:11,fontWeight:600,color:C.ab,background:C.as,padding:"2px 8px",borderRadius:10}}>{unreadCount} new</span>}
    </div>
    {notifsState.map(n=><div key={n.id} onClick={()=>handleNotifClick(n)} style={{padding:"13px 20px",borderBottom:`1px solid ${C.brd}06`,display:"flex",gap:10,cursor:"pointer",background:n.read?"transparent":C.cardH+"60",transition:"background 0.15s"}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:n.color,marginTop:6,flexShrink:0}}/>
      <div style={{flex:1}}>
        <div style={{fontSize:13,lineHeight:1.4,color:n.read?C.ts:C.txt}}>{n.text}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
          <span style={{fontSize:11,color:C.td}}>{n.time}</span>
          <span style={{fontSize:11,color:C.ab,fontWeight:600}}>View →</span>
        </div>
      </div>
    </div>)}
    {notifsState.length===0&&<div style={{padding:30,textAlign:"center",color:C.td}}>No notifications</div>}
  </div>;

  /* ── HOME ── */
  const HomeView=()=><div style={{display:"flex",flexDirection:"column",gap}}>
    <div className="fu" style={{background:`linear-gradient(135deg,${C.card} 0%,#0C2340 100%)`,borderRadius:14,border:`1px solid ${C.brdL}`,padding:mob?"18px":"22px 24px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",right:-10,top:-20,opacity:0.04,fontSize:mob?120:200}}>⚓</div>
      <div style={{position:"relative"}}>
        <div style={{fontSize:13,color:C.ts,marginBottom:3}}>Welcome back,</div>
        <h2 style={{fontSize:mob?20:26,fontWeight:800,margin:"0 0 2px",letterSpacing:"-0.02em"}}>{cust.contact}</h2>
        <div style={{fontSize:mob?12:14,color:C.ts}}>{cust.name}</div>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(4,1fr)",gap:mob?10:14}}>
      {[
        {l:"Outstanding",v:aed(totalOut),c:C.ab,sp:[180000,195000,230000,215000,210000,totalOut]},
        {l:"Overdue",v:aed(totalOver),c:C.rd,sp:[40000,60000,90000,120000,130000,totalOver],s:"1 invoice"},
        {l:"Paid (30d)",v:aed(totalPaid),c:C.gn,sp:[95000,110000,140000,155000,170000,totalPaid]},
        {l:"Credit Left",v:aed(cust.creditLimit-cust.creditUsed),c:C.tl,sp:[200000,240000,280000,300000,290000,cust.creditLimit-cust.creditUsed],s:Math.round(cust.creditUsed/cust.creditLimit*100)+"% used"},
      ].map((k,i)=><div key={i} className={`fu fu${i+1}`} style={{background:C.card,borderRadius:12,border:`1px solid ${C.brd}`,padding:mob?"14px":"18px 20px"}}>
        <div style={{fontSize:11,color:C.ts,marginBottom:6,fontWeight:500}}>{k.l}</div>
        <div style={{fontSize:mob?16:22,fontWeight:800,letterSpacing:"-0.02em"}}>{k.v}</div>
        {k.s&&<div style={{fontSize:11,color:C.td,marginTop:2}}>{k.s}</div>}
        <div style={{marginTop:8}}><Spark data={k.sp} color={k.c} w={mob?100:110}/></div>
      </div>)}
    </div>

    <Card><h3 style={{fontSize:15,fontWeight:700,margin:"0 0 14px"}}>Action Required</h3>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {unpaid.map(inv=><div key={inv.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:mob?"10px 12px":"12px 14px",background:C.cardH,borderRadius:10,border:`1px solid ${inv.status==="overdue"?C.rd+"30":C.brd}`,gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flex:"1 1 auto",minWidth:0}} onClick={()=>{navigate("invoices",inv)}}>
            <div style={{width:36,height:36,borderRadius:9,background:inv.status==="overdue"?C.rs:C.as,display:"flex",alignItems:"center",justifyContent:"center",color:inv.status==="overdue"?C.rd:C.ac,flexShrink:0}}><IcShip size={16}/></div>
            <div style={{minWidth:0,cursor:"pointer"}}>
              <div style={{fontSize:14,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{inv.vessel}</div>
              <div style={{fontSize:12,color:C.td}}>{inv.id}</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:mob?14:15,fontWeight:700}}>{aed(inv.amount)}</div>
              <Badge status={inv.status}/>
            </div>
            <Btn style={{padding:"8px 12px",fontSize:12}} onClick={()=>openPay(inv)}>Pay</Btn>
          </div>
        </div>)}
      </div>
    </Card>

    <Card><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h3 style={{fontSize:15,fontWeight:700,margin:0}}>Recent Payments</h3><Btn variant="ghost" style={{fontSize:13,padding:"6px 8px"}} onClick={()=>navigate("history")}>View All <IcChev size={14}/></Btn></div>

            {payStep>0&&payStep<3?<Btn variant="outline" onClick={()=>setPayStep(s=>s-1)} style={{flex:mob?1:undefined}}>Back</Btn>:<div style={{flex:mob?1:undefined}}/>}
            {payStep<3
              ?<Btn onClick={()=>setPayStep(s=>s+1)} style={{flex:mob?1:undefined,justifyContent:"center"}}>{payStep===2?"Confirm & Submit":"Continue"}</Btn>
              :<Btn onClick={()=>{setPayModal(false);goHome()}} style={{flex:mob?1:undefined,justifyContent:"center"}}>Done</Btn>
            }
          </div>
        </div>
      </div>
    </div>;
  };

  /* ── NAV ITEMS ── */
  const mainTabs=[{id:"home",l:"Home",icon:IcDash},{id:"invoices",l:"Invoices",icon:IcInv},{id:"pay",l:"Pay",icon:IcWallet},{id:"history",l:"History",icon:IcHist},{id:"more",l:"More",icon:IcMenu}];
  const navItems=[{id:"home",l:"My Account",icon:IcDash},{id:"invoices",l:"My Invoices",icon:IcInv},{id:"pay",l:"Make Payment",icon:IcWallet},{id:"history",l:"Payment History",icon:IcHist},{id:"statements",l:"Statements",icon:IcFile},{id:"support",l:"Help & Support",icon:IcHelp}];
  const tabLabel=navItems.find(n=>n.id===tab)?.l||(tab==="support"?"Help & Support":tab==="statements"?"Statements":"");

  /* ═══ MOBILE LAYOUT ═══ */
  if(mob) return <div style={{display:"flex",flexDirection:"column",height:"100vh",background:C.bg}}>
    <header style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:C.sf,minHeight:56,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {/* Back button on mobile when not on home */}
        {canGoBack&&tab!=="home"?
          <button onClick={goBack} style={{background:"none",border:"none",color:C.ts,cursor:"pointer",padding:6,marginRight:2}}><IcBack size={22}/></button>
        :null}
        {/* Logo — taps go home */}
        <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={goHome}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.ac},${C.tl})`,display:"flex",alignItems:"center",justifyContent:"center"}}><IcAnchor size={16}/></div>
          <div><div style={{fontSize:14,fontWeight:800,lineHeight:1.2}}>GTPay</div><div style={{fontSize:10,color:C.td}}>MSC · {cust.id}</div></div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{position:"relative"}}>
          <button style={{background:"none",border:"none",color:C.ts,cursor:"pointer",padding:8,position:"relative"}} onClick={()=>setNotifOpen(!notifOpen)}>
            <IcBell size={20}/>
            {unreadCount>0&&<span style={{position:"absolute",top:4,right:4,width:7,height:7,borderRadius:"50%",background:C.rd}}/>}
          </button>
          {notifOpen&&<div style={{position:"fixed",inset:0,zIndex:90}} onClick={()=>setNotifOpen(false)}>
            <div onClick={e=>e.stopPropagation()}>
              <NotifPanel style={{position:"absolute",top:56,right:8,left:8}}/>
            </div>
          </div>}
        </div>
        <div style={{width:30,height:30,borderRadius:7,background:"#1A365D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:C.ab}}>AR</div>
      </div>
    </header>

    <div style={{flex:1,overflow:"auto",padding:16}}>
      {moreOpen?<div style={{display:"flex",flexDirection:"column",gap:8}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>More</div>
        {[{id:"statements",l:"Statements",icon:IcFile},{id:"support",l:"Help & Support",icon:IcHelp}].map(item=>
          <Card key={item.id} style={{padding:"14px 16px",cursor:"pointer"}} onClick={()=>{navigate(item.id);setMoreOpen(false)}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:36,height:36,borderRadius:9,background:C.as,display:"flex",alignItems:"center",justifyContent:"center",color:C.ac}}><item.icon size={17}/></div><span style={{fontSize:14,fontWeight:600}}>{item.l}</span><div style={{marginLeft:"auto",color:C.td}}><IcChev size={16}/></div></div>
          </Card>
        )}
      </div>:
        tab==="home"?<HomeView/>:tab==="invoices"?<InvoicesView/>:tab==="pay"?<PayView/>:tab==="history"?<HistoryView/>:tab==="statements"?<StatementsView/>:tab==="support"?<SupportView/>:null
      }
    </div>

    <nav style={{display:"flex",borderTop:`1px solid ${C.brd}`,background:C.sf,paddingBottom:"env(safe-area-inset-bottom)",flexShrink:0}}>
      {mainTabs.map(t=>{
        const active=t.id==="more"?moreOpen:(tab===t.id&&!moreOpen);
        return <button key={t.id} onClick={()=>{if(t.id==="more"){setMoreOpen(!moreOpen)}else{goTab(t.id)}}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",color:active?C.ab:C.td,transition:"color 0.15s"}}>
          <t.icon size={20}/><span style={{fontSize:10,fontWeight:600}}>{t.l}</span>
        </button>;
      })}
    </nav>
    {payModal&&<PayModal/>}
  </div>;

  /* ═══ DESKTOP LAYOUT ═══ */
  return <div style={{display:"flex",height:"100vh",background:C.bg}}>
    <div style={{width:250,minWidth:250,background:C.sf,borderRight:`1px solid ${C.brd}`,display:"flex",flexDirection:"column"}}>
      {/* Logo — click goes home */}
      <div style={{padding:"20px 22px",borderBottom:`1px solid ${C.brd}`,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={goHome}>
        <div style={{width:38,height:38,borderRadius:10,background:`linear-gradient(135deg,${C.ac},${C.tl})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IcAnchor size={20}/></div>
        <div><div style={{fontSize:15,fontWeight:800,letterSpacing:"-0.02em",lineHeight:1.2}}>GTPay</div><div style={{fontSize:10,color:C.td,fontWeight:600,letterSpacing:"0.06em"}}>CUSTOMER PORTAL</div></div>
      </div>
      <div style={{padding:"16px 22px",borderBottom:`1px solid ${C.brd}`}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:8,background:"#1A365D",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:C.ab}}>MSC</div>
          <div><div style={{fontSize:13,fontWeight:700,lineHeight:1.2}}>{cust.short}</div><div style={{fontSize:11,color:C.td}}>{cust.id}</div></div>
        </div>
      </div>
      <nav style={{padding:"14px 8px",flex:1,display:"flex",flexDirection:"column",gap:2}}>
        {navItems.map(item=><button key={item.id} onClick={()=>goTab(item.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderRadius:10,cursor:"pointer",transition:"all 0.15s",background:tab===item.id?C.as:"transparent",color:tab===item.id?C.ab:C.ts,fontWeight:tab===item.id?600:400,fontSize:14,border:"none",width:"100%",textAlign:"left",fontFamily:"inherit"}}><item.icon size={19}/><span>{item.l}</span></button>)}
      </nav>
    </div>

    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <header style={{padding:"14px 32px",borderBottom:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:C.sf,minHeight:64}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {/* Desktop back button */}
          {canGoBack&&tab!=="home"&&<button onClick={goBack} style={{background:C.cardH,border:`1px solid ${C.brd}`,borderRadius:8,color:C.ts,cursor:"pointer",padding:"6px 8px",display:"flex",alignItems:"center"}}><IcBack size={18}/></button>}
          <div><h1 style={{fontSize:19,fontWeight:800,margin:0}}>{tabLabel}</h1><div style={{fontSize:12,color:C.td,marginTop:2}}>Port of Khorfakkan · Khorfakkan Commercial Terminal Operations</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{position:"relative"}}>
            <button style={{background:"none",border:"none",color:C.ts,cursor:"pointer",padding:6,position:"relative"}} onClick={()=>setNotifOpen(!notifOpen)}>
              <IcBell size={20}/>
              {unreadCount>0&&<span style={{position:"absolute",top:3,right:3,width:8,height:8,borderRadius:"50%",background:C.rd}}/>}
            </button>
            {notifOpen&&<NotifPanel style={{position:"absolute",top:"100%",right:0,width:400,marginTop:8,zIndex:50}}/>}
          </div>
          <div style={{width:1,height:26,background:C.brd}}/>
          <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:34,height:34,borderRadius:8,background:"#1A365D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:C.ab}}>AR</div><div><div style={{fontSize:13,fontWeight:700}}>{cust.contact}</div><div style={{fontSize:11,color:C.td}}>Port Finance · MSC</div></div></div>
        </div>
      </header>
      <div style={{flex:1,overflow:"auto",padding:"26px 32px"}}>
        {tab==="home"&&<HomeView/>}{tab==="invoices"&&<InvoicesView/>}{tab==="pay"&&<PayView/>}{tab==="history"&&<HistoryView/>}{tab==="statements"&&<StatementsView/>}{tab==="support"&&<SupportView/>}
      </div>
    </div>
    {payModal&&<PayModal/>}
    {/* Click-away for desktop notifications */}
    {notifOpen&&<div style={{position:"fixed",inset:0,zIndex:40}} onClick={()=>setNotifOpen(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
